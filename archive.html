    <div class="info-text">
    <h1>This is a visual archive of the ephemera related to the shanzhai phenomenon. 
        Unlike most online forums that feature shanzhai, this page is a place of appreciation instead of ridicule.</h1>

    <div class="upload-container">
    <details class="collapse-menu">
        <summary class="collapse-toggle">Contribute to the gallery</summary>

        <div class="collapse-content">
            <input type="file" id="myFile" multiple onchange="showFileInfo()">
            <label for="myFile" class="custom-file-upload">+</label>
            <p id="demo"></p>
            <input type="text" placeholder="Add image description" class="img-descrip">
            <button onclick="uploadFiles()" class="upload">
                Upload
            </button>
        </div>    
        </div>
    </details>

<script>
function showFileInfo() {
  const input = document.getElementById("myFile");
  let txt = "";

  if (input.files.length === 0) {
    txt = "Select one or more files.";
  } else {
    for (let i = 0; i < input.files.length; i++) {
    const file = input.files[i];
    txt += "File " + ": " + file.name + "<br>";
    }
  }

  document.getElementById("demo").innerHTML = txt;
}

// UPLOAD FILES TO SERVER
async function uploadFiles() {
  const input = document.getElementById("myFile");

  if (!input.files.length) {
    alert("Select files first");
    return;
  }

  for (let i = 0; i < input.files.length; i++) {
    const file = input.files[i];

    const arrayBuffer = await file.arrayBuffer();
    console.log(file)
    console.log(arrayBuffer)

    let request = new Request('/uploadFile', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/octet-stream',
        'x-file-name': file.name
      },
      body: arrayBuffer
    })

    fetch(request).then((response) => {
        if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
        }
        alert("Files uploaded to server");
    }).catch((error) =>{
        alert("Error: " + error);
    });
  }
}
</script>

          <script>
            
        const modal = document.getElementById("imgModal");
        const modalImg = document.getElementById("modalImg");
        const captionText = document.getElementById("caption");
        const images = document.querySelectorAll(".gallery-img");
        const closeBtn = document.querySelector(".close");
        images.forEach(img => {
            img.addEventListener("click", function() {
                modal.style.display = "block";
                modalImg.src = this.src;
                captionText.innerHTML = this.alt;
            });
        });
        closeBtn.onclick = function() {
            modal.style.display = "none";
        };
        // Optional: close when clicking outside image
        modal.onclick = function(e) {
            if (e.target === modal) {
                modal.style.display = "none";
            }
        };
    </script>
