    <h1>This is a visual archive of the ephemera related to the shanzhai phenomenon. Unlike most online forums that feature shanzhai, this page is a place of appreciation instead of ridicule.</h1>
   
<input type="file" id="myFile" multiple onchange="showFileInfo()">
<label for="myFile" class="custom-file-upload">
  Select an image file
</label>
  <p id="demo"></p>

<button onclick="uploadFiles()"class="upload">Upload to Server</button>
<!-- <p id="demo"></p> -->


<script>
// SHOW FILE INFO (your original functionality, cleaned up)
function showFileInfo() {
  const input = document.getElementById("myFile");
  let txt = "";

  if (input.files.length === 0) {
    txt = "Select one or more files.";
  } else {
    for (let i = 0; i < input.files.length; i++) {
    const file = input.files[i];
    txt += "File " + ": " + file.name + "<br>";
    }
  }

  document.getElementById("demo").innerHTML = txt;
}

// UPLOAD FILES TO SERVER
async function uploadFiles() {
  const input = document.getElementById("myFile");

  if (!input.files.length) {
    alert("Select files first");
    return;
  }

  for (let i = 0; i < input.files.length; i++) {
    const file = input.files[i];

    const arrayBuffer = await file.arrayBuffer();
    console.log(file)
    console.log(arrayBuffer)

    let request = new Request('/uploadFile', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/octet-stream',
        'x-file-name': file.name
      },
      body: arrayBuffer
    })

    fetch(request).then((response) => {
        if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
        }
        alert("Files uploaded to server");
    }).error((error) =>{
        alert("Error: " + error);
    });
  }
}
</script>
